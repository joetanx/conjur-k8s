---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cityapp-summon
---
apiVersion: v1
kind: Service
metadata:
  name: cityapp-summon
  labels:
    app: cityapp-summon
spec:
  ports:
  - port: 80
    nodePort: 30081
    name: http
  selector:
    app: cityapp-summon
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: cityapp-summon
  name: cityapp-summon
spec:
  replicas: 1
  selector:
   matchLabels:
    app: cityapp-summon
  template:
    metadata:
      labels:
        app: cityapp-summon
    spec:
      serviceAccountName: cityapp-summon
      containers:
      - image: localhost/cityapp:1.0
        imagePullPolicy: IfNotPresent
        name: cityapp
        env:
          - name: CONJUR_APPLIANCE_URL
            value: "https://follower.default.svc.cluster.local/api"
          - name: CONJUR_ACCOUNT
            value: "cyberark"
          - name: CONJUR_SSL_CERTIFICATE
            valueFrom:
              configMapKeyRef:
                name: follower-certificate
                key: ssl-certificate
          - name: CONJUR_AUTHN_TOKEN_FILE
            value: /run/conjur/access-token
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
          - mountPath: /run/conjur
            name: conjur-access-token
            readOnly: true
          - mountPath: /etc/summon
            name: summon-config
            readOnly: true
        command: [ "summon", "-f", "/etc/summon/cityapp-summon-config.yaml", "ruby", "/usr/src/cityapp.rb", "-o", "0.0.0.0" ]
      initContainers:  # comment this line to troubleshoot authenticator container
      - image:  cyberark/conjur-authn-k8s-client
        imagePullPolicy: IfNotPresent
        name: authenticator
        env:
          - name: CONTAINER_MODE
            value: init
          - name: MY_POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: MY_POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: MY_POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: CONJUR_APPLIANCE_URL
            value: "https://follower.default.svc.cluster.local/api"
          - name: CONJUR_AUTHN_URL
            value: "https://follower.default.svc.cluster.local/api/authn-k8s/demo"
          - name: CONJUR_ACCOUNT
            value: "cyberark"
          - name: CONJUR_AUTHN_LOGIN
            value: "host/conjur/authn-k8s/demo/apps/default/service_account/cityapp-summon"
          - name: CONJUR_SSL_CERTIFICATE
            valueFrom:
              configMapKeyRef:
                name: follower-certificate
                key: ssl-certificate
        volumeMounts:
          - mountPath: /run/conjur
            name: conjur-access-token
      volumes:
        - name: conjur-access-token
          emptyDir:
            medium: Memory
        - name: summon-config
          configMap:
            name: cityapp-summon-config
