### Authenticators ###
### - Create the conjur/authn-k8s/demo/apps policy
### - Create authenticators for Summon and Secretless service accounts under this policy
- !policy
  id: conjur/authn-k8s/demo/apps
  annotations:
     description: Identities permitted to authenticator to this cluster
  body:
   - !layer
     annotations:
       description: Layer of authenticator identities to call authn service
   - &hosts
     - !host
       id: default/service_account/cityapp-summon
       annotations:
         kubernetes/authentication-container-name: authenticator
     - !host
       id: default/service_account/cityapp-secretless
       annotations:
         kubernetes/authentication-container-name: authenticator
   - !grant
     role: !layer
     members: *hosts
### AppIdentities ###
### - Create the k8s-apps/default policy and layer
### - The authenticators created in Authenticators is added to the k8s-apps/default layer
- !policy
  id: k8s-apps/default
  body:
  - !layer
  - !grant
    role: !layer
    members:
    - !host /conjur/authn-k8s/demo/apps/default/service_account/cityapp-summon
    - !host /conjur/authn-k8s/demo/apps/default/service_account/cityapp-secretless
### Variables and permissions ###
### - Create the world_db policy
### - Create variables username and password, and group consumers under world_db policy
### - The world_db/consumers group is granted read and execute permissions on the variables
### - The k8s-apps/default layer created in AppIdentities section is added to the world_db/consumers group
- !policy
  id: world_db
  body:
  - &init-variables
    - !variable username
    - !variable password
  - !group consumers
  - !permit
    role: !group consumers
    privilege: [ read, execute ]
    resources: *init-variables
- !grant
  role: !group world_db/consumers
  members:
  - !layer k8s-apps/default
